dataset:
  csv_url: "https://raw.githubusercontent.com/OWASP-Benchmark/BenchmarkJava/master/expectedresults-1.2.csv"
  source_base_url: "https://raw.githubusercontent.com/OWASP-Benchmark/BenchmarkJava/master/src/main/java/org/owasp/benchmark/testcode"
  # Alternative: local_repo_path for cloned repos (faster, no network calls)
  # local_repo_path: "/path/to/BenchmarkJava"
  local_repo_path: null

  # Number of test cases to sample (null = run all 2,740)
  # Recommended: 100 for initial testing
  sample_size: 100

  # Random seed for reproducible sampling
  random_seed: 42

judge:
  # Model to use for security judgments
  # Options: claude-haiku-4-5@20251001, claude-sonnet-4-6@20250514, claude-opus-4-8@20250514
  model: "claude-haiku-4-5@20251001"

  # Environment variables for Red Hat corporate endpoint (do not change)
  vertex_corp_api_env: "MODEL_API"
  vertex_corp_key_env: "USER_KEY"

  # Maximum tokens for model response
  max_tokens: 1024

  # Extended thinking mode ("adaptive" or "disabled")
  # Note: May not be supported on all corporate endpoints
  thinking: "disabled"

  # Temperature (null = use default 0.0)
  temperature: null

  # Maximum retry attempts on API errors
  max_retries: 3

  # Client-side rate limit (requests per minute)
  # Adjust based on your corporate endpoint quotas
  requests_per_minute: 50

execution:
  # Maximum concurrent API calls
  concurrency: 10

  # Output directory for results
  output_dir: "./results"

  # Resume mode: skip test cases with existing verdict files
  resume: true

scoring:
  # Optional: minimum confidence threshold for filtering verdicts
  confidence_threshold: 0.5
